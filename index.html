<!DOCTYPE html>
<head>
  <title>NoodleyOSC</title>
</head>

<body>

<div class="container">

  <img class="logoImg" src="assets/images/holy-yoylecakes.png" alt="logoxdxd">

  <div class="logoTexto">NoodleyOSC</div>
  <div class="desc">Contenido random desde 2022</div>

  <div class="textodeabajodellogo">Mis proyectos</div>

  <div class="botones">
    <button class="botonFNF" onClick="fnf()">Mods de FNF</button>
    <button class="botonGD" onClick="gd()">Niveles de GD</button>
    <button class="botonMas" onClick="mas()">Más</button>
  </div>

  <a class="vspan" id="vspan" href="https://noodleyosc.itch.io/fnf-vs-pan">fnf vs pan</a>
  <img class="panimg" id="panimg" src="assets/images/pan.png" alt="pan">

  <a class="leveleasyplus" id="leveleasyplus" href="https://gdbrowser.com/141158220" style="display:none">
    Level Easy Plus
  </a>

  <div class="gdID1" id="gdID1" onClick="copyGDid1()" style="display:none">
    Copiar ID
  </div>

  <a class="gdps" id="gdps" href="gdps.html" style="display:none">
    FideoDash GDPS
  </a>

</div>

<script>
function gd() {
  document.getElementById("vspan").style.display = "none";
  document.getElementById("panimg").style.display = "none";
  document.getElementById("gdps").style.display = "none";

  document.getElementById("leveleasyplus").style.display = "block";
  document.getElementById("gdID1").style.display = "block";
}

function fnf() {
  document.getElementById("vspan").style.display = "block";
  document.getElementById("panimg").style.display = "block";

  document.getElementById("leveleasyplus").style.display = "none";
  document.getElementById("gdID1").style.display = "none";
  document.getElementById("gdps").style.display = "none";
}

function mas() {
  document.getElementById("vspan").style.display = "none";
  document.getElementById("panimg").style.display = "none";

  document.getElementById("leveleasyplus").style.display = "none";
  document.getElementById("gdID1").style.display = "none";

  document.getElementById("gdps").style.display = "block";
}

function copyGDid1() {
  navigator.clipboard.writeText("141158220");

  let texto = document.getElementById("gdID1");
  texto.innerText = "¡Copiado!";
  texto.style.color = "green";

  setTimeout(() => {
    texto.innerText = "Copiar ID";
    texto.style.color = "black";
  }, 2000);
}
</script>

</body>
